# Copyright (C) 2026 Rodrigo Brito
# SPDX-License-Identifier: GPL-3.0-or-later
#
# Compila o binário nativo (Rust + GTK4), gera os pacotes .deb/.rpm (Linux)
# e um ZIP portátil (Windows), e publica um Release no GitHub quando uma tag
# "v*" é enviada.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux (.deb/.rpm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v5

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev \
            libpango1.0-dev libcairo2-dev \
            libenchant-2-dev libdbus-1-dev \
            rpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Instalar ferramentas de empacotamento
        run: cargo install cargo-generate-rpm cargo-deb

      - name: Compilar (release)
        run: cargo build --release --workspace

      - name: Gerar pacote .rpm
        run: cargo generate-rpm -p prosa-gtk

      - name: Gerar pacote .deb
        run: cargo deb -p prosa-gtk --no-build

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            native/target/generate-rpm/*.rpm
            native/target/debian/*.deb

  windows:
    name: Build Windows (.zip portátil)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
        working-directory: native
    steps:
      - uses: actions/checkout@v5

      # Rust vem do próprio MSYS2 (não do rustup), pra casar a ABI (UCRT)
      # com a das libs C (GTK4, libadwaita, enchant) instaladas do mesmo
      # jeito abaixo — é o ambiente recomendado pelo MSYS2/gtk-rs pra apps
      # Rust+GTK no Windows.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-enchant
            mingw-w64-ucrt-x86_64-toolchain
            zip

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Compilar (release)
        run: cargo build --release --workspace

      - name: Montar pacote portátil
        run: |
          set -euo pipefail

          dist=dist
          rm -rf "$dist"
          mkdir -p "$dist/bin"
          cp target/release/prosa.exe "$dist/bin/"

          # Coleta recursiva das DLLs do MSYS2 (ucrt64) usadas pelo binário,
          # ignorando DLLs de sistema do Windows (já presentes no SO, não
          # redistribuíveis por nós). `ldd` sai com status != 0 sempre que
          # encontra alguma DLL "not found" — o que inclui as virtuais do
          # ApiSet do Windows (`api-ms-win-*`/`ext-ms-win-*`, resolvidas pelo
          # próprio SO em runtime, não são arquivos de verdade), então o
          # `|| true` evita que isso mate o script via `pipefail`; o grep
          # abaixo já filtra pra só considerar DLLs reais do ucrt64.
          declare -A seen
          queue=("$dist/bin/prosa.exe")
          while [ "${#queue[@]}" -gt 0 ]; do
            current="${queue[0]}"
            queue=("${queue[@]:1}")
            deps=$(ldd "$current" | grep -i '/ucrt64/bin/' | awk '{print $3}' || true)
            for dep in $deps; do
              base=$(basename "$dep")
              if [ -z "${seen[$base]:-}" ]; then
                seen[$base]=1
                cp -u "$dep" "$dist/bin/"
                queue+=("$dist/bin/$base")
              fi
            done
          done

          # Recursos que o GTK/GLib precisa em runtime além das DLLs.
          # Mantém bin/, share/ e lib/ como irmãos: é assim que o GLib no
          # Windows descobre o prefixo de instalação a partir do caminho da
          # própria DLL (mesma estrutura do prefixo ucrt64/ do MSYS2).
          mkdir -p "$dist/share/glib-2.0/schemas"
          cp /ucrt64/share/glib-2.0/schemas/gschemas.compiled "$dist/share/glib-2.0/schemas/"

          mkdir -p "$dist/share/icons"
          cp -r /ucrt64/share/icons/Adwaita "$dist/share/icons/"
          cp -r /ucrt64/share/icons/hicolor "$dist/share/icons/"
          # Mescla os ícones do próprio app no hicolor do bundle.
          cp -r prosa-gtk/data/icons/hicolor/* "$dist/share/icons/hicolor/"

          mkdir -p "$dist/lib/gdk-pixbuf-2.0/2.10.0/loaders"
          cp /ucrt64/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll "$dist/lib/gdk-pixbuf-2.0/2.10.0/loaders/"
          cp /ucrt64/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache "$dist/lib/gdk-pixbuf-2.0/2.10.0/"

      - name: Validar dependências ausentes
        run: |
          set -euo pipefail
          # As DLLs virtuais do ApiSet do Windows (ver comentário no passo
          # anterior) aparecem como "not found" no `ldd` mesmo resolvendo
          # normalmente em runtime — excluídas aqui pra não gerar falso
          # positivo na validação.
          missing=$(ldd dist/bin/prosa.exe | grep -i "not found" | grep -viE 'api-ms-win-|ext-ms-win-' || true)
          if [ -n "$missing" ]; then
            echo "DLLs necessárias não encontradas no pacote:"
            echo "$missing"
            exit 1
          fi
          echo "Nenhuma DLL ausente."

      - name: Gerar ZIP portátil
        run: (cd dist && zip -r ../prosa-windows-x86_64.zip .)

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: native/prosa-windows-x86_64.zip

      # Instalador .msi (WiX Toolset v3, via cargo-wix) — complementa o .zip
      # portátil acima com atalho no Menu Iniciar, entrada em
      # "Adicionar/remover programas" e desinstalador. Instalação por
      # usuário (sem UAC) — ver wix/main.wxs em prosa-gtk.
      #
      # Roda no shell nativo do runner (pwsh), não no MSYS2 do resto do
      # job: o shell MSYS2 não herda o PATH completo do Windows (candle.exe
      # e choco não são visíveis de lá — confirmado empiricamente), então
      # usa um toolchain Rust nativo (msvc) só pra este trecho, separado do
      # Rust do MSYS2/UCRT64 que compilou o prosa.exe.
      - uses: dtolnay/rust-toolchain@stable

      - name: Garantir WiX Toolset
        shell: pwsh
        run: |
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            Write-Host "WiX Toolset não encontrado no PATH — instalando via choco."
            choco install wixtoolset -y --no-progress
          }

      - name: Instalar cargo-wix
        shell: pwsh
        run: cargo install cargo-wix

      - name: Harvest do runtime (heat.exe) para o instalador
        shell: pwsh
        run: |
          heat.exe dir dist `
            -cg DistComponents -dr APPLICATIONFOLDER `
            -gg -scom -sreg -sfrag -srd `
            -out prosa-gtk\wix\dist-harvest.wxs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Gerar instalador .msi
        shell: pwsh
        run: |
          # -b vincula o token "SourceDir" que o heat.exe usa (por padrão,
          # sem -var) nos caminhos harvestados em dist-harvest.wxs — sem
          # isso o light.exe não acha as DLLs.
          #
          # -sice:ICE38/-sice:ICE64 suprimem duas validações do WiX que
          # partem do princípio de instalação por máquina (Program Files):
          # ICE38 exige KeyPath de registro (não de arquivo) pra
          # componentes no perfil do usuário; ICE64 exige que todo
          # diretório no perfil do usuário conste na tabela RemoveFile.
          # Trade-off aceito conscientemente pela instalação per-user (sem
          # UAC) — o heat.exe harvesta ~1600 arquivos como componentes de
          # arquivo simples, sem viabilidade de gerar KeyPath de registro
          # por item; na prática, o efeito colateral é o desinstalador
          # poder deixar diretórios vazios (não os arquivos em si, que são
          # removidos normalmente).
          cargo wix -p prosa-gtk --no-build --nocapture -L -b -L dist -L -sice:ICE38 -L -sice:ICE64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-ChildItem target\wix\*.msi

      - name: Upload Windows MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-artifact
          path: native/target/wix/*.msi

  publish:
    name: Publish Release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R all-artifacts

      - name: Create and Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-artifacts/**/*.deb
            all-artifacts/**/*.rpm
            all-artifacts/**/*.zip
            all-artifacts/**/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dispara o build "de verdade" no openSUSE Build Service
  # (home:rodrigosbrito:atelier/prosa), que tem seu próprio _service
  # (tar_scm com match-tag: v*) buscando a mesma tag direto do GitHub —
  # este job só avisa o OBS pra rebuscar e rebuildar, via
  # https://openbuildservice.org/help/manuals/obs-user-guide/cha-obs-authorization-token
  # Token de trigger escopado só pra "runservice" no pacote prosa (osc
  # token --create home:rodrigosbrito:atelier prosa runservice), guardado
  # como secret OBS_TOKEN_PROSA. Depende só de `publish` (a release do
  # GitHub já está no ar antes de avisar o OBS) e é best-effort: falha
  # aqui não desfaz a release.
  trigger-obs:
    name: Disparar build no OBS
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Disparar rebuild no OBS (prosa)
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN_PROSA }}
        run: |
          if [ -z "$OBS_TOKEN" ]; then
            echo "OBS_TOKEN_PROSA não configurado, pulando." >&2
            exit 0
          fi
          curl -fsS -H "Authorization: Token $OBS_TOKEN" \
            -X POST "https://api.opensuse.org/trigger/runservice?project=home:rodrigosbrito:atelier&package=prosa"
