#
# Compila os instaladores (deb, rpm, exe) e publica um Release no GitHub
# quando uma tag "v*" é enviada. Opcionalmente publica o pacote na AUR.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux: gera .deb e .rpm e publica no Release.
  # ---------------------------------------------------------------------------
  linux:
    name: Build Linux (deb, rpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # rpmbuild é necessário para o alvo rpm do electron-builder.
      - name: Instalar ferramentas de empacotamento
        run: sudo apt-get update && sudo apt-get install -y rpm

      - run: npm ci
      - run: npm run build

      - name: Empacotar e publicar (deb, rpm)
        run: npx --no-install electron-builder --linux deb rpm --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Guardar .deb para o job da AUR
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: release/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows: gera o instalador NSIS (.exe) e publica no Release.
  # ---------------------------------------------------------------------------
  windows:
    name: Build Windows (exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Empacotar e publicar (exe)
        run: npx --no-install electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # AUR: publica o pacote prosa-bin na Arch User Repository.
  # Requer os segredos AUR_SSH_PRIVATE_KEY e a variável ENABLE_AUR=true.
  # ---------------------------------------------------------------------------
  aur:
    name: Publish AUR (prosa-bin)
    runs-on: ubuntu-latest
    needs: linux
    if: startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_AUR == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Baixar o .deb publicado
        uses: actions/download-artifact@v4
        with:
          name: deb
          path: deb

      - name: Gerar PKGBUILD com versão e sha256 corretos
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB="$(ls deb/*.deb | head -n1)"
          SHA="$(sha256sum "$DEB" | cut -d' ' -f1)"
          mkdir -p out
          sed -e "s/__PKGVER__/${VERSION}/g" -e "s/__SHA256__/${SHA}/g" \
            packaging/aur/PKGBUILD.in > out/PKGBUILD
          echo "=== PKGBUILD gerado ==="
          cat out/PKGBUILD

      - name: Publicar na AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: prosa-bin
          pkgbuild: out/PKGBUILD
          commit_username: ${{ vars.AUR_USERNAME }}
          commit_email: ${{ vars.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Atualiza para ${{ github.ref_name }}"
