<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src 'self'; style-src 'unsafe-inline'"
    />
    <title>Prosa</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
      }
      .splash {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #0f1117;
        border: 1px solid #2a2d3a;
        -webkit-app-region: drag;
      }
      .logo {
        width: 188px;
        height: 188px;
        object-fit: contain;
        border-radius: 26px;
        border: 1px solid #2a2d3a;
        box-shadow: 0 12px 32px rgba(6, 182, 212, 0.22);
        opacity: 0;
        transform: scale(0.92);
        animation: appear 0.6s ease-out forwards;
      }
      @keyframes appear {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .bar {
        width: 180px;
        height: 4px;
        border-radius: 4px;
        background: #1a1d27;
        overflow: hidden;
        position: relative;
      }
      .bar::before {
        content: '';
        position: absolute;
        left: -40%;
        top: 0;
        width: 40%;
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, #06b6d4, #7c5cff);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% {
          left: -40%;
        }
        100% {
          left: 100%;
        }
      }
      .version {
        color: #6b7280;
        font-family: Inter, system-ui, sans-serif;
        font-size: 11px;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <img class="logo" src="assets/prosa-logo.png" alt="Prosa" />
      <div class="bar"></div>
      <div class="version">carregando…</div>
    </div>
  </body>
</html>
